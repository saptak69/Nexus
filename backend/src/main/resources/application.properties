# Multipart file upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom JWT configuration
nexus.jwt.secret=9a727c62b662d515a8b71d9d1c9d4b3c4f5e6d7c8b9a0a1b2c3d4e5f60718293
# JWT expiration: 86400000 ms = 24 hours
nexus.jwt.expiration-ms=86400000

# Custom File upload path (local storage for dev, easily switchable to S3/Cloudinary)
nexus.upload.dir=./uploads

