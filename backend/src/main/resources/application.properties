# Server configuration
server.port=8080

# Database configuration (H2 In-Memory/File for easy local running out-of-the-box)
spring.datasource.url=jdbc:h2:file:./data/nexus_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA & Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# PostgreSQL Database Configuration (Uncomment to use PostgreSQL)
# spring.datasource.url=jdbc:postgresql://localhost:5432/nexus_db
# spring.datasource.username=postgres
# spring.datasource.password=saptak@7439
# spring.datasource.driver-class-name=org.postgresql.Driver
